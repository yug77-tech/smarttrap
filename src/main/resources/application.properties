# Server
server.port=8080
spring.application.name=SmartTrap AI

# ── H2 In-Memory Database (no install needed — works out of the box) ──────────
spring.datasource.url=jdbc:h2:mem:smarttrap_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (view DB at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Logging
logging.level.com.smarttrap=INFO
logging.level.org.springframework.web=WARN

# IoT Simulation Settings
smarttrap.simulation.enabled=true
smarttrap.simulation.interval-ms=3000
smarttrap.simulation.max-attacks-per-batch=3
